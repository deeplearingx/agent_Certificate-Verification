version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        INSTALL_MINERU: ${INSTALL_MINERU:-0}
    container_name: document-verification-api-prod
    environment:
      PROJECT_ROOT: /app
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      EMBED_MODEL_PATH: /app/models
      CNAS_DB_DIR: /app/vector_db/cnas_calibration
      TEMPERATURE_DB_DIR: /app/vector_db/temperature
      GENERAL_CYCLE_DB_DIR: /app/vector_db/general_cycle
      HUAWEI_CYCLE_DB_DIR: /app/vector_db/huawei_cycle
      ADDRESS_DB_DIR: /app/vector_db/address
      LOCAL_PDF_DIR: /app/local_pdf
      LOCAL_MD_DIR: /app/local_md
      LOCAL_JSON_DIR: /app/local_json
      FINAL_REPORTS_DIR: /app/final_reports
      REPORTS_DIR: /app/reports
    expose:
      - "8000"
    volumes:
      - ./models:/app/models
      - ./vector_db:/app/vector_db
      - ./local_pdf:/app/local_pdf
      - ./local_md:/app/local_md
      - ./local_json:/app/local_json
      - ./final_reports:/app/final_reports
      - ./reports:/app/reports
      - ./output:/app/output
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: document-verification-streamlit-prod
    environment:
      STREAMLIT_API_BASE_URL: http://nginx
    expose:
      - "8501"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: document-verification-nginx
    depends_on:
      - api
      - streamlit
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

